<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>5S Dashboard - CD Mercado Central</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,sans-serif;background:#0f1117;color:#e2e8f0;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:200px;min-width:200px;background:#1a1d27;border-right:1px solid #2d3154;display:flex;flex-direction:column}
.sb-logo{padding:14px 14px 10px;border-bottom:1px solid #2d3154}
.sb-logo h1{font-size:14px;font-weight:700;color:#fff}
.sb-logo p{font-size:10px;color:#64748b;margin-top:1px}
.sb-team{display:flex;gap:4px;padding:7px;border-bottom:1px solid #2d3154}
.tb{flex:1;padding:5px;border-radius:6px;border:1px solid #2d3154;background:transparent;color:#94a3b8;cursor:pointer;font-size:11px;font-weight:600}
.tb.on{background:#3b82f6;border-color:#3b82f6;color:#fff}
.sb-nav{flex:1;overflow-y:auto;padding:4px 0}
.nl{font-size:10px;color:#64748b;font-weight:700;letter-spacing:1px;padding:9px 13px 3px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:8px 13px;cursor:pointer;color:#94a3b8;border-left:3px solid transparent}
.ni:hover{background:#22263a;color:#e2e8f0}
.ni.on{background:#22263a;color:#fff;border-left-color:#3b82f6}
.ni .ic{font-size:14px;width:16px;text-align:center}
.ni .lb{font-size:12px;font-weight:500}
.sb-sync{padding:6px 8px;border-top:1px solid #2d3154;display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-txt{font-size:10px;color:#64748b}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tp{padding:9px 16px;background:#1a1d27;border-bottom:1px solid #2d3154;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.tp-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.tp h2{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
.tp p{font-size:10px;color:#64748b;margin-top:1px}
.tp-sep{color:#2d3154;font-size:18px}
.yr-sel{background:#22263a;border:1px solid #2d3154;border-radius:6px;color:#e2e8f0;font-size:12px;padding:4px 8px;cursor:pointer;outline:none}
/* Month dropdown */
.month-dd-container{position:relative;display:inline-block}
#month-btn{background:#22263a;border:1px solid #2d3154;border-radius:6px;color:#e2e8f0;font-size:12px;padding:4px 10px;cursor:pointer;white-space:nowrap;min-width:100px;text-align:left}
#month-btn:hover{border-color:#3b82f6}
#month-dd-wrap{position:absolute;top:calc(100% + 4px);left:0;background:#1a1d27;border:1px solid #2d3154;border-radius:8px;z-index:200;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#month-dd{list-style:none;padding:4px 0;max-height:260px;overflow-y:auto}
.tp-right{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.ct{flex:1;overflow-y:auto;padding:14px 18px}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.b-blue{background:#3b82f6;color:#fff}.b-blue:hover{background:#2563eb}
.b-ghost{background:transparent;border:1px solid #2d3154;color:#94a3b8}.b-ghost:hover{background:#22263a;color:#e2e8f0}
.b-green{background:#22c55e;color:#fff}
.b-purple{background:#8b5cf6;color:#fff}
.card{background:#1a1d27;border:1px solid #2d3154;border-radius:10px;padding:14px;margin-bottom:10px}
.ct2{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:#1a1d27;border:1px solid #2d3154;border-radius:10px;padding:14px;text-align:center}
.kpi .v{font-size:28px;font-weight:800;line-height:1}
.kpi .l{font-size:10px;color:#64748b;margin-top:3px;font-weight:700;text-transform:uppercase}
.kpi .t{font-size:11px;margin-top:4px}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
.bg{background:rgba(34,197,94,.15);color:#22c55e}
.by{background:rgba(245,158,11,.15);color:#f59e0b}
.br{background:rgba(239,68,68,.15);color:#ef4444}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 9px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;border-bottom:1px solid #2d3154;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid rgba(45,49,84,.4);font-size:12px;vertical-align:middle}
tr:hover td{background:#22263a}
.bt{height:5px;background:#2d3154;border-radius:3px;overflow:hidden;flex:1}
.bf{height:100%;border-radius:3px}
.mw{position:relative;border-radius:10px;overflow:hidden;background:#111;user-select:none}
.mw img{display:block;width:100%;height:100%;object-fit:contain;opacity:.85;pointer-events:none}
#mc{position:absolute;top:0;left:0;width:100%;height:100%}
#tip{position:fixed;background:#1e2235;border:1px solid #2d3154;border-radius:8px;padding:9px 13px;pointer-events:none;z-index:9999;min-width:160px;display:none}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.ov.on{display:flex}
.modal{background:#1a1d27;border:1px solid #2d3154;border-radius:12px;width:92%;max-width:900px;max-height:90vh;overflow-y:auto}
.mh{padding:14px 18px;border-bottom:1px solid #2d3154;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#1a1d27;z-index:1}
.mb{padding:14px 18px}
.xb{background:none;border:none;color:#64748b;font-size:19px;cursor:pointer;padding:2px 7px;border-radius:4px}
.xb:hover{background:#22263a}
.tabs{display:flex;gap:2px;border-bottom:1px solid #2d3154;margin-bottom:12px}
.tab{padding:7px 13px;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:#3b82f6;border-bottom-color:#3b82f6}
.tp2{display:none}.tp2.on{display:block}
.ac{background:#22263a;border:1px solid #2d3154;border-radius:7px;padding:11px;margin-bottom:7px}
.acg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.fl{display:flex;flex-direction:column;gap:2px}
.fl label{font-size:10px;color:#64748b;text-transform:uppercase;font-weight:700}
.fl input,.fl select,.fl textarea{background:#1a1d27;border:1px solid #2d3154;border-radius:5px;color:#e2e8f0;font-size:12px;padding:4px 7px;outline:none;font-family:inherit;width:100%}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:#3b82f6}
.fl textarea{resize:vertical;min-height:36px}
.scw{overflow-x:auto}
.sct{min-width:800px;border-collapse:collapse;font-size:11px}
.sct th{padding:5px 6px;background:#22263a;border:1px solid #2d3154;text-align:center;font-size:10px;white-space:nowrap}
.sct th.left{text-align:left}
.sct td{padding:3px 5px;border:1px solid #2d3154;vertical-align:middle}
.sct td.zname{font-weight:600;font-size:11px;white-space:nowrap}
.oc{background:rgba(34,197,94,.08)}
.dz{border:2px dashed #2d3154;border-radius:10px;padding:26px;text-align:center;cursor:pointer}
.dz:hover{border-color:#3b82f6;background:rgba(59,130,246,.04)}
.hmh{display:flex;gap:3px;margin-left:192px;margin-bottom:2px}
.hmc{width:42px;text-align:center;font-size:10px;color:#64748b;font-weight:600;line-height:1.3}
.hmr{display:flex;gap:3px;align-items:center;margin-bottom:2px}
.hml{font-size:11px;color:#94a3b8;width:189px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.hmcell{width:42px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer}
.hmcell:hover{transform:scale(1.1)}
.ztbl{overflow-x:auto}
.ztbl table{min-width:500px}
.ztbl th{text-align:center;padding:6px 8px;font-size:10px;color:#64748b}
.ztbl th.left{text-align:left}
.ztbl td{text-align:center;padding:5px 6px;font-size:11px}
.ztbl td.left{text-align:left}
.zsc{display:inline-block;padding:2px 6px;border-radius:6px;font-size:11px;font-weight:700;min-width:34px;text-align:center}
.zsc-empty{color:#2d3154;font-size:11px}
.zone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:10px}
.zcard{background:#1a1d27;border:1px solid #2d3154;border-radius:10px;padding:14px;cursor:pointer;transition:transform .15s}
.zcard:hover{transform:translateY(-2px)}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-sel{background:#22263a;border:1px solid #2d3154;border-radius:6px;color:#e2e8f0;font-size:12px;padding:5px 10px;cursor:pointer;outline:none}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.ob{background:rgba(34,197,94,.15);color:#22c55e;font-size:10px;padding:2px 6px;border-radius:9px;font-weight:700}
.cx{background:rgba(139,92,246,.15);color:#8b5cf6;font-size:10px;padding:2px 6px;border-radius:9px;font-weight:700}
.ein{border:none;background:transparent;color:inherit;font:inherit;border-bottom:1px dashed #2d3154;outline:none;padding:1px 3px}
.ein:focus{border-bottom-color:#3b82f6}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2d3154;border-radius:2px}
</style>
</head>
<body>
<div class="app">
<aside class="sb">
  <div class="sb-logo"><h1>5S Dashboard</h1><p>CD Mercado Central</p></div>

<div class="mn">

        <option value="2027">2027</option>

      <span class="tp-sep">|</span>
      <div class="month-dd-container">
        <button id="month-btn" onclick="toggleMonthDd()">Todos los meses &#x25BE;</button>
        <div id="month-dd-wrap" style="display:none">
          <ul id="month-dd"></ul>
        </div>
      </div>
    </div>
    <div class="tp-right" id="tr"></div>
  </div>
  <div class="ct" id="ct">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b">Cargando...</div>
  </div>
</div>
</div>
<div id="tip"></div>
<div class="ov" id="ov" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="mh"><div id="mt" style="font-size:15px;font-weight:700"></div><button class="xb" onclick="closeM()">&#x2715;</button></div>
    <div class="mb" id="mb"></div>
  </div>
</div>

async function loadFromSupa(){
  try {
    var r1=await sbFetch("s5_config?id=eq.main&select=*");
    if(r1.ok){
      var d=await r1.json();
      if(d&&d[0]){
        var c=d[0];
        if(c.zones)     ST.cfg_CMQ.zones=c.zones;
        if(c.rects)     ST.cfg_CMQ.rects=c.rects;
        if(c.sched)     ST.cfg_CMQ.sched=c.sched;
        if(c.cfg)       ST.cfg_CMQ.cfg=Object.assign(ST.cfg_CMQ.cfg,c.cfg);
        if(c.map_img)   ST.cfg_CMQ.mapImg=c.map_img;
        if(c.zones_ol)  ST.cfg_OL.zones=c.zones_ol;
        if(c.rects_ol)  ST.cfg_OL.rects=c.rects_ol;
        if(c.sched_ol)  ST.cfg_OL.sched=c.sched_ol;
        if(c.cfg_ol)    ST.cfg_OL.cfg=Object.assign(ST.cfg_OL.cfg,c.cfg_ol);
        if(c.map_img_ol)ST.cfg_OL.mapImg=c.map_img_ol;
      }
    }
    var r2=await sbFetch("s5_records?select=*&order=mes.asc");
    if(r2.ok){
      var ex=await r2.json();
      ST.recs=BASE.slice();
      if(ex&&ex.length){
        ex.forEach(function(r){
          var idx=ST.recs.findIndex(function(x){return x.zona===r.zona&&x.mes===r.mes&&(x.team||"CMQ")===r.team;});
          if(idx>=0)ST.recs.splice(idx,1);
          ST.recs.push({mes:r.mes,auditor:r.auditor,zona:r.zona,scores:r.scores,comentario:r.comentario,team:r.team});
        });
      }
    }
    var r3=await sbFetch("s5_actions?select=*");
    if(r3.ok){
      var acts=await r3.json();
      ST.acts={};
      if(acts&&acts.length){
        acts.forEach(function(a){
          var k=a.zona+"|"+a.mes;
          if(!ST.acts[k])ST.acts[k]=[];
          ST.acts[k].push({id:a.id,text:a.text,who:a.who,forum:a.forum,status:a.status,due:a.due,notes:a.notes,mes:parseInt(a.mes)||0});
        });
      }
    }
    setSS(true,"Sincronizado");
  } catch(e) {
    setSS(false,"Sin conexion");
    ST.recs=BASE.slice();
  }
  initMonthDropdown();
  go(ST.view);
}

// ── HELPERS ─────────────────────────────────────────────────
function tRecs(){
  return ST.recs.filter(function(r){
    return ST.team==="CMQ"?(!r.team||r.team==="CMQ"):r.team==="OL";
  });
}
function getZones(){
  var seen={},out=[],hidden=tc().hiddenZones||[];
  tRecs().forEach(function(r){if(!seen[r.zona]&&hidden.indexOf(r.zona)<0){seen[r.zona]=1;out.push(r.zona);}});
  Object.keys(tc().zones).forEach(function(z){if(!seen[z]&&hidden.indexOf(z)<0){seen[z]=1;out.push(z);}});
  return out.sort();
}
function zRecs(z){return tRecs().filter(function(r){return r.zona===z;});}
function allMonths(){
  var seen={},out=[];
  tRecs().forEach(function(r){if(r.mes&&!seen[r.mes]){seen[r.mes]=1;out.push(r.mes);}});
  return out.sort(function(a,b){return a-b;});
}
function activeMonths(){
  return ST.selMonths.length>0?ST.selMonths.slice():allMonths();
}
function zoneAvgScore(z){
  var ms=activeMonths(),scores=[];
  ms.forEach(function(m){var r=tRecs().find(function(x){return x.zona===z&&x.mes===m;});if(r){var s=tot(r.scores);if(s!==null)scores.push(s);}});
  return scores.length?scores.reduce(function(a,b){return a+b;},0)/scores.length:null;
}
function zoneAvgByS(z,si){
  var ms=activeMonths(),vals=[];
  ms.forEach(function(m){var r=tRecs().find(function(x){return x.zona===z&&x.mes===m;});if(r){var v=bys(r.scores)[si];if(v!==null)vals.push(v);}});
  return vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:null;
}
function bys(sc){
  var off=[0,7,13,18,24];
  return SC.map(function(cnt,i){
    var sl=sc.slice(off[i],off[i]+cnt).filter(function(v){return v!==null&&v!==undefined;});
    return sl.length?sl.reduce(function(a,b){return a+b;},0)/(cnt*4)*100:null;
  });
}
function tot(sc){
  var v=sc.filter(function(x){return x!==null&&x!==undefined;});
  return v.length?v.reduce(function(a,b){return a+b;},0)/(v.length*4)*100:null;
}
function sem(p){if(p===null||p===undefined)return"#64748b";return p>=tc().cfg.green?"#22c55e":p>=tc().cfg.yellow?"#f59e0b":"#ef4444";}
function semcls(p){if(p===null||p===undefined)return"badge";return p>=tc().cfg.green?"badge bg":p>=tc().cfg.yellow?"badge by":"badge br";}
function pct(p){return(p!==null&&p!==undefined)?Math.round(p)+"%":"—";}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
function escJ(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function periodLabel(){
  var ms=activeMonths();
  if(!ms.length)return"Sin datos";
  if(ms.length===1)return MN[ms[0]];
  if(ms.length===allMonths().length)return"YTD";
  return MNS[ms[0]]+" - "+MNS[ms[ms.length-1]];
}

function initMonthDropdown(){
  var ms=allMonths();
  var dd=document.getElementById("month-dd");
  if(!dd)return;
  if(ST.selMonths.length===0)ST.selMonths=ms.slice();
  dd.innerHTML="";
  // All toggle
  var allLi=document.createElement("li");
  allLi.style.cssText="padding:6px 12px;cursor:pointer;border-bottom:1px solid #2d3154;font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:7px";
  allLi.innerHTML="<input type='checkbox' id='m-all' style='cursor:pointer'><label for='m-all' style='cursor:pointer;font-weight:700'>Todos</label>";
  allLi.querySelector("input").checked=(ST.selMonths.length===ms.length);
  allLi.querySelector("input").onchange=function(){
    if(this.checked)ST.selMonths=ms.slice();else ST.selMonths=[];
    renderMonthBtn();initMonthDropdown();go(ST.view);
  };
  dd.appendChild(allLi);
  ms.forEach(function(m){
    var li=document.createElement("li");
    li.style.cssText="padding:5px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:7px";
    var chkId="m-"+m;
    var checked=ST.selMonths.indexOf(m)>=0;
    li.innerHTML="<input type='checkbox' id='"+chkId+"' style='cursor:pointer' "+(checked?"checked":"")+"><label for='"+chkId+"' style='cursor:pointer'>"+MN[m]+"</label>";
    li.querySelector("input").onchange=function(){
      if(this.checked){if(ST.selMonths.indexOf(m)<0)ST.selMonths.push(m);}
      else{ST.selMonths=ST.selMonths.filter(function(x){return x!==m;});}
      ST.selMonths.sort(function(a,b){return a-b;});
      renderMonthBtn();
      var allCk=document.getElementById("m-all");
      if(allCk)allCk.checked=(ST.selMonths.length===ms.length);
      go(ST.view);
    };
    li.onmouseenter=function(){this.style.background="#22263a";};
    li.onmouseleave=function(){this.style.background="";};
    dd.appendChild(li);
  });
}

function renderMonthBtn(){
  var btn=document.getElementById("month-btn");
  if(!btn)return;
  var ms=activeMonths(),all=allMonths();
  var lbl=ms.length===0?"Sin meses":ms.length===all.length?"Todos los meses":ms.length===1?MN[ms[0]]:ms.length+" meses";
  btn.textContent=lbl+" ▾";
}

// ── DASHBOARD ───────────────────────────────────────────────
function rDash(){
  var ms=activeMonths(), zz=getZones(), lbl=periodLabel();
  var allMs=allMonths();

  // CD score
  var allSc=[];
  zz.forEach(function(z){var s=zoneAvgScore(z);if(s!==null)allSc.push(s);});
  var cdScore=allSc.length?allSc.reduce(function(a,b){return a+b;},0)/allSc.length:null;

  // Previous period trend
  var prevMs=[];
  if(ms.length>0){var minM=ms[0];for(var pi=0;pi<ms.length;pi++){if(minM-1-pi>=1)prevMs.unshift(minM-1-pi);}}
  var prevSc=[];
  zz.forEach(function(z){var sc=[];prevMs.forEach(function(m){var r=tRecs().find(function(x){return x.zona===z&&x.mes===m;});if(r){var s=tot(r.scores);if(s!==null)sc.push(s);}});if(sc.length)prevSc.push(sc.reduce(function(a,b){return a+b;},0)/sc.length);});
  var prevCD=prevSc.length?prevSc.reduce(function(a,b){return a+b;},0)/prevSc.length:null;
  var trnd=(cdScore!==null&&prevCD!==null)?cdScore-prevCD:null;

  // By S
  var byS=SL.map(function(_,si){var vals=[];zz.forEach(function(z){var v=zoneAvgByS(z,si);if(v!==null)vals.push(v);});return vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:null;});

  // Ranking - separate from card html so click works cleanly
  var ranking=zz.map(function(z){return{z:z,score:zoneAvgScore(z)};}).filter(function(x){return x.score!==null;}).sort(function(a,b){return b.score-a.score;});
  var auditedCount=ranking.length;
  var cov=zz.length?Math.round(auditedCount/zz.length*100):0;

  // Sort zones by owner
  var sortedZ=zz.slice().sort(function(a,b){
    var oa=(tc().zones[a]?tc().zones[a].owner||"":"").toLowerCase();
    var ob=(tc().zones[b]?tc().zones[b].owner||"":"").toLowerCase();
    return oa!==ob?oa<ob?-1:1:a<b?-1:1;
  });

  // Visible months in table = selected months (or all if none selected)
  var visCols=ms.length>0?ms:allMs;

  var h="";

  // 4 KPIs
  h+="<div class='g4' style='margin-bottom:10px'>";
  h+="<div class='kpi'><div class='v' style='color:"+sem(cdScore)+"'>"+pct(cdScore)+"</div><div class='l'>Score CD</div>";
  if(trnd!==null)h+="<div class='t' style='color:"+(trnd>=0?"#22c55e":"#ef4444")+"\">"+( trnd>=0?"▲":"▼")+Math.abs(trnd).toFixed(1)+"% vs anterior</div>";
  h+="</div>";
  h+="<div class='kpi'><div class='v' style='color:#3b82f6'>"+auditedCount+"</div><div class='l'>Zonas auditadas</div><div class='t' style='color:#64748b'>"+cov+"% cobertura</div></div>";
  h+="<div class='kpi'><div class='v' style='color:#22c55e'>"+ranking.filter(function(r){return r.score>=tc().cfg.green;}).length+"</div><div class='l'>En verde &#8805;"+tc().cfg.green+"%</div></div>";
  h+="<div class='kpi'><div class='v' style='color:#ef4444'>"+ranking.filter(function(r){return r.score<tc().cfg.yellow;}).length+"</div><div class='l'>En rojo &lt;"+tc().cfg.yellow+"%</div></div>";
  h+="</div>";

  // Zone overview table - only visible months as columns
  h+="<div class='card' style='margin-bottom:10px'>";
  h+="<div class='ct2'>Resumen por zona — "+lbl+"</div>";
  h+="<div class='ztbl'><table><thead><tr>";
  h+="<th class='left' style='min-width:155px'>Zona</th>";
  h+="<th class='left' style='min-width:80px'>Area</th>";
  h+="<th class='left' style='min-width:110px'>Dueño</th>";
  visCols.forEach(function(m){h+="<th>"+MNS[m]+"</th>";});
  if(visCols.length>1)h+="<th>Prom.</th>";
  h+="</tr></thead><tbody>";
  sortedZ.forEach(function(z){
    var owner=tc().zones[z]?tc().zones[z].owner||"—":"—";
    var avg=zoneAvgScore(z);
    h+="<tr class='zrow' data-z='"+esc(z)+"' style='cursor:pointer'>";
    var zA=tc().zones[z]?tc().zones[z].area||"":"";
    h+="<td class='left' style='font-weight:600;font-size:12px'>"+z+"</td>";
    h+="<td class='left' style='color:#64748b;font-size:11px'>"+zA+"</td>";
    h+="<td class='left' style='color:#94a3b8;font-size:11px'>"+owner+"</td>";
    visCols.forEach(function(m){
      var r=tRecs().find(function(x){return x.zona===z&&x.mes===m;});
      if(r){var s=tot(r.scores);h+="<td><span class='zsc' style='background:"+sem(s)+"22;color:"+sem(s)+"'>"+pct(s)+"</span></td>";}
      else h+="<td><span class='zsc-empty'>—</span></td>";
    });
    if(visCols.length>1)h+="<td><span class='"+semcls(avg)+"'>"+pct(avg)+"</span></td>";
    h+="</tr>";
  });
  h+="</tbody></table></div></div>";

  // Score por S + Ranking side by side - EQUAL HEIGHT via grid
  h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px'>";

  // Score por S card
  h+="<div class='card' style='display:flex;flex-direction:column'>";
  h+="<div class='ct2'>Score por S — "+lbl+"</div>";
  h+="<canvas id='rad' width='220' height='170' style='display:block;margin:0 auto 10px'></canvas>";
  byS.forEach(function(v,i){
    h+="<div style='display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(45,49,84,.3)'>";
    h+="<span style='font-size:14px'>"+SE[i]+"</span>";
    h+="<span style='flex:1;font-size:12px;font-weight:600'>"+SL[i]+"</span>";
    h+="<div style='display:flex;align-items:center;gap:5px;width:115px'>";
    h+="<div class='bt'><div class='bf' style='width:"+(v||0)+"%;background:"+sem(v)+"'></div></div>";
    h+="<span style='font-size:12px;font-weight:800;color:"+sem(v)+";width:34px;text-align:right'>"+pct(v)+"</span>";
    h+="</div></div>";
  });
  h+="</div>";

  // Ranking card
  h+="<div class='card' style='display:flex;flex-direction:column'>";
  h+="<div class='ct2'>Ranking — "+lbl+"</div>";
  h+="<div id='rank-wrap' style='flex:1;overflow-y:auto'>";
  ranking.forEach(function(item,i){
    var mc=i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#cd7c3d":"#64748b";
    var dc=tc().zones[item.z]?(tc().zones[item.z].color||"#334155"):"#334155";
    h+="<div class='rank-row' data-z='"+esc(item.z)+"' style='display:flex;align-items:center;gap:8px;padding:8px 6px;border-radius:6px;cursor:pointer;border-bottom:1px solid rgba(45,49,84,.2)'>";
    h+="<span style='width:22px;text-align:center;font-size:12px;font-weight:700;color:"+mc+";flex-shrink:0'>"+(i+1)+"</span>";
    h+="<div style='width:10px;height:10px;border-radius:50%;background:"+dc+";flex-shrink:0'></div>";
    h+="<span style='flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+item.z+"</span>";
    h+="<span style='font-size:15px;font-weight:800;color:"+sem(item.score)+";flex-shrink:0'>"+pct(item.score)+"</span>";
    h+="</div>";
  });
  h+="</div></div>";
  h+="</div>"; // end grid

  // Trend
  h+="<div class='card' style='margin-bottom:10px'><div class='ct2'>Tendencia CD — Score mensual</div>";
  h+="<canvas id='trd' height='120' style='width:100%;display:block'></canvas></div>";

  // Heatmap
  h+="<div class='card'><div class='ct2'>Heatmap S x Zona — "+lbl+"</div><div id='hm' style='overflow-x:auto'></div></div>";

  document.getElementById("ct").innerHTML=h;

  // Delegated clicks - no inline onclick needed
  var ztbl=document.getElementById("ct").querySelector(".ztbl");
  if(ztbl){ztbl.addEventListener("click",function(e){var row=e.target.closest(".zrow");if(row)openZone(row.getAttribute("data-z"));});}
  var rw=document.getElementById("rank-wrap");
  if(rw){rw.addEventListener("click",function(e){var row=e.target.closest(".rank-row");if(row)openZone(row.getAttribute("data-z"));});
    // Hover effects via delegation
    rw.addEventListener("mouseover",function(e){var row=e.target.closest(".rank-row");if(row)row.style.background="#22263a";});
    rw.addEventListener("mouseout",function(e){var row=e.target.closest(".rank-row");if(row)row.style.background="";});
  }

  setTimeout(function(){drawRad(byS,"rad");drawTrd(zz);drawHM(sortedZ);},30);
}

function drawRad(byS,id){
  var c=document.getElementById(id);if(!c)return;
  var ctx=c.getContext("2d"),W=c.width,H=c.height,cx=W/2,cy=H/2,r=Math.min(W,H)/2-34,n=5,step=Math.PI*2/n;
  ctx.clearRect(0,0,W,H);
  [.25,.5,.75,1].forEach(function(f){ctx.beginPath();for(var i=0;i<n;i++){var a=-Math.PI/2+i*step;ctx.lineTo(cx+Math.cos(a)*r*f,cy+Math.sin(a)*r*f);}ctx.closePath();ctx.strokeStyle="rgba(45,49,84,.6)";ctx.lineWidth=1;ctx.stroke();});
  for(var i=0;i<n;i++){var a=-Math.PI/2+i*step;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.strokeStyle="rgba(45,49,84,.4)";ctx.stroke();ctx.fillStyle="#94a3b8";ctx.font="11px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(SE[i],cx+Math.cos(a)*(r+15),cy+Math.sin(a)*(r+15));}
  var tgc=tc().cfg.green/100;
  ctx.beginPath();for(var i=0;i<n;i++){var a=-Math.PI/2+i*step;if(i===0)ctx.moveTo(cx+Math.cos(a)*r*tgc,cy+Math.sin(a)*r*tgc);else ctx.lineTo(cx+Math.cos(a)*r*tgc,cy+Math.sin(a)*r*tgc);}ctx.closePath();ctx.strokeStyle="rgba(34,197,94,.4)";ctx.setLineDash([4,3]);ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);
  ctx.beginPath();for(var i=0;i<n;i++){var a=-Math.PI/2+i*step,f=(byS[i]||0)/100;if(i===0)ctx.moveTo(cx+Math.cos(a)*r*f,cy+Math.sin(a)*r*f);else ctx.lineTo(cx+Math.cos(a)*r*f,cy+Math.sin(a)*r*f);}ctx.closePath();ctx.fillStyle="rgba(59,130,246,.18)";ctx.fill();ctx.strokeStyle="#3b82f6";ctx.lineWidth=2;ctx.stroke();
  for(var i=0;i<n;i++){var a=-Math.PI/2+i*step,f=(byS[i]||0)/100;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r*f,cy+Math.sin(a)*r*f,3,0,Math.PI*2);ctx.fillStyle=SK[i];ctx.fill();}
}

function drawTrd(zz){
  var c=document.getElementById("trd");if(!c)return;
  var ms=allMonths();if(ms.length<1)return;
  var dpr=window.devicePixelRatio||1;
  var cssW=c.offsetWidth||800;
  c.width=cssW*dpr;c.height=120*dpr;c.style.width=cssW+"px";c.style.height="120px";
  var ctx=c.getContext("2d");ctx.scale(dpr,dpr);
  var W=cssW,H=120,pL=44,pR=70,pT=18,pB=28;
  var data=ms.map(function(m){
    var sc=[];zz.forEach(function(z){var r=tRecs().find(function(x){return x.zona===z&&x.mes===m;});if(r){var s=tot(r.scores);if(s!==null)sc.push(s);}});
    return sc.length?sc.reduce(function(a,b){return a+b;},0)/sc.length:null;
  });
  var valid=data.filter(function(v){return v!==null;});if(!valid.length)return;
  var minV=Math.max(0,Math.floor(Math.min.apply(null,valid)/10)*10-10);var maxV=100;
  function xS(i){return ms.length===1?W/2:pL+(W-pL-pR)*i/(ms.length-1);}
  function yS(v){return pT+(H-pT-pB)*(1-(v-minV)/(maxV-minV));}
  ctx.clearRect(0,0,W,H);
  // Y gridlines
  for(var gv=Math.ceil(minV/10)*10;gv<=100;gv+=10){
    var gy=yS(gv);
    ctx.beginPath();ctx.moveTo(pL,gy);ctx.lineTo(W-pR,gy);
    ctx.strokeStyle="rgba(45,49,84,.3)";ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle="#64748b";ctx.font="10px sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";
    ctx.fillText(gv+"%",pL-6,gy);
  }
  // Target
  var cfg=tc().cfg;
  if(cfg.green>=minV){
    var ty=yS(cfg.green);
    ctx.beginPath();ctx.moveTo(pL,ty);ctx.lineTo(W-pR,ty);
    ctx.strokeStyle="rgba(34,197,94,.6)";ctx.setLineDash([5,3]);ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#22c55e";ctx.font="bold 10px sans-serif";ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.fillText("Target "+cfg.green+"%",W-pR+4,ty);
  }
  // Highlight selected months
  var selMs=activeMonths();
  ms.forEach(function(m,i){
    if(selMs.indexOf(m)>=0&&data[i]!==null){
      var bx=i===0?pL:xS(i)-(ms.length>1?(xS(1)-xS(0))/2:20);
      var bw=ms.length>1?(xS(1)-xS(0)):40;
      ctx.fillStyle="rgba(59,130,246,.07)";
      ctx.fillRect(bx,pT,bw,H-pT-pB);
    }
  });
  // Area
  var fxi=null,lxi=null;
  data.forEach(function(v,i){if(v!==null){if(fxi===null)fxi=i;lxi=i;}});
  if(fxi!==null){
    ctx.beginPath();
    var fi=true;data.forEach(function(v,i){if(v!==null){if(fi){ctx.moveTo(xS(i),yS(v));fi=false;}else ctx.lineTo(xS(i),yS(v));}});
    ctx.lineTo(xS(lxi),H-pB);ctx.lineTo(xS(fxi),H-pB);ctx.closePath();
    ctx.fillStyle="rgba(59,130,246,.07)";ctx.fill();
  }
  // Line
  ctx.beginPath();var fi2=true;
  data.forEach(function(v,i){if(v!==null){if(fi2){ctx.moveTo(xS(i),yS(v));fi2=false;}else ctx.lineTo(xS(i),yS(v));}});
  ctx.strokeStyle="#3b82f6";ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.stroke();
  // Dots + labels
  data.forEach(function(v,i){
    var x=xS(i);
    var isSel=selMs.length===0||selMs.indexOf(ms[i])>=0;
    // Month label
    ctx.fillStyle=isSel?"#94a3b8":"#475569";
    ctx.font=(isSel?"bold ":"")+"11px sans-serif";
    ctx.textAlign="center";ctx.textBaseline="top";
    ctx.fillText(MNS[ms[i]],x,H-pB+5);
    if(v===null)return;
    // Dot
    ctx.beginPath();ctx.arc(x,yS(v),isSel?5:3,0,Math.PI*2);
    ctx.fillStyle=isSel?sem(v):"#2d3154";ctx.fill();
    if(isSel){ctx.strokeStyle="#0f1117";ctx.lineWidth=1.5;ctx.stroke();}
    // Value label
    if(isSel){
      var lbl=Math.round(v)+"%";
      ctx.font="bold 11px sans-serif";
      var tw=ctx.measureText(lbl).width;
      var lx=x,ly=yS(v)-13;
      ctx.fillStyle="rgba(15,17,23,.85)";
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(lx-tw/2-4,ly-7,tw+8,14,3);else ctx.rect(lx-tw/2-4,ly-7,tw+8,14);
      ctx.fill();
      ctx.fillStyle=sem(v);ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(lbl,lx,ly);
    }
  });
}

function loadMapImg(){
  var inp=document.createElement("input");inp.type="file";inp.accept="image/*";
  inp.onchange=function(){
    var f=inp.files[0];if(!f)return;
    var img=new Image(),rd=new FileReader();
    rd.onload=function(e){
      img.onload=function(){
        var maxW=1600,scale=Math.min(1,maxW/img.width);
        var cv=document.createElement("canvas");cv.width=img.width*scale;cv.height=img.height*scale;
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        tc().mapImg=cv.toDataURL("image/jpeg",0.85);
        saveConfig();rMapa();
      };img.src=e.target.result;
    };rd.readAsDataURL(f);
  };inp.click();
}

function undoMap(){
  if(ST.mapUndo.length===0){
    var t=document.createElement("div");t.style.cssText="position:fixed;top:18px;right:18px;background:#f59e0b;color:#000;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;z-index:9999";t.textContent="No hay nada para deshacer";document.body.appendChild(t);setTimeout(function(){t.remove();},2000);
    return;
  }
  tc().rects=ST.mapUndo.pop();
  saveConfig();paintMap();
}

function initMap(){
  var img=document.getElementById("mi"),c=document.getElementById("mc"),wrap=document.getElementById("mw");
  if(!c||!img||!img.offsetWidth)return;
  c.width=wrap.offsetWidth;c.height=wrap.offsetHeight;
  paintMap();setupMapEv(c);
}

function setupMapEv(c){
  c.style.cursor="default";
  c.onmousedown=function(e){
    if(!ST.editMap){mapClick(e,c);return;}
    var r=c.getBoundingClientRect();
    ST.d.x0=(e.clientX-r.left)/c.offsetWidth;ST.d.y0=(e.clientY-r.top)/c.offsetHeight;
    ST.drawing=true;
  };
  c.onmousemove=function(e){
    var r=c.getBoundingClientRect();
    var mx=(e.clientX-r.left)/c.offsetWidth,my=(e.clientY-r.top)/c.offsetHeight;
    if(ST.drawing){ST.d.x1=mx;ST.d.y1=my;paintMap();}
    else if(!ST.editMap)showTip(e,mx,my);
  };
  c.onmouseup=function(){
    if(!ST.drawing)return;ST.drawing=false;
    var w=Math.abs(ST.d.x1-ST.d.x0),h=Math.abs(ST.d.y1-ST.d.y0);
    if(w<0.01||h<0.01){paintMap();return;}

function showTip(e,mx,my){

function mapClick(e,c){

function paintMap(){
  var c=document.getElementById("mc");if(!c)return;
  var ctx=c.getContext("2d"),W=c.width,H=c.height;

  var rects=tc().rects;
  rects.forEach(function(r){
    var bc=r.color||"#334155";
    ctx.fillStyle=bc+"88";
    ctx.fillRect(r.x*W,r.y*H,r.w*W,r.h*H);
  });
  if(ST.drawing){
    var x=Math.min(ST.d.x0,ST.d.x1),y=Math.min(ST.d.y0,ST.d.y1),w=Math.abs(ST.d.x1-ST.d.x0),h=Math.abs(ST.d.y1-ST.d.y0);

    ctx.strokeStyle="#3b82f6";ctx.lineWidth=2;ctx.setLineDash([5,3]);ctx.strokeRect(x*W,y*H,w*W,h*H);ctx.setLineDash([]);
  }
}

  if(!tc().zones[z])tc().zones[z]={owner:"",area:"",photo:"",color:"#334155"};

}
async function deleteZone(z){
  var recCount=ST.recs.filter(function(r){return r.zona===z;}).length;
  if(recCount===0){
    if(!confirm("Eliminar zona: "+z+"\n\nSe eliminara del mapa y la configuracion."))return;
    delete tc().zones[z];
    tc().rects=tc().rects.filter(function(r){return r.zone!==z;});
    saveConfig();
    rCfg();
    return;
  }
  // Zone has audit records - warn and let the user decide
  var msg="La zona \""+z+"\" tiene "+recCount+" registro(s) de auditoria cargados.\n\n"+
    "Aceptar = ELIMINAR TODO (zona + "+recCount+" auditorias, no se puede deshacer)\n"+
    "Cancelar = solo OCULTAR la zona del mapa/config (las auditorias quedan guardadas)";
  var full=confirm(msg);
  if(full){
    if(!confirm("Confirmacion final: se van a borrar PERMANENTEMENTE "+recCount+" registros de auditoria de \""+z+"\". Â¿Continuar?"))return;
    delete tc().zones[z];
    tc().rects=tc().rects.filter(function(r){return r.zone!==z;});
    saveConfig();
    var team=ST.team;
    ST.recs=ST.recs.filter(function(r){return r.zona!==z;});
    try{await sbFetch("s5_records?zona=eq."+encodeURIComponent(z)+"&team=eq."+team,{method:"DELETE",xh:{"Prefer":"return=minimal"}});}catch(e){}
    rCfg();
  } else {
    var hideOnly=confirm("Â¿Ocultar la zona \""+z+"\" del mapa y configuracion, manteniendo sus "+recCount+" auditorias guardadas?\n\nAceptar = ocultar ahora\nCancelar = no hacer nada");
    if(!hideOnly)return;
    delete tc().zones[z];
    tc().rects=tc().rects.filter(function(r){return r.zone!==z;});
    if(!tc().hiddenZones)tc().hiddenZones=[];
    if(tc().hiddenZones.indexOf(z)<0)tc().hiddenZones.push(z);
    saveConfig();
    rCfg();
  }
}
function deleteZoneByIdx(idx){
  var zones=window._cfgZones;

}

function doPhoto(z){
  var f=document.getElementById("ph-inp").files[0];if(!f)return;
  var img=new Image(),rd=new FileReader();
  rd.onload=function(e){
    img.onload=function(){
      var cv=document.createElement("canvas"),s=Math.min(1,400/img.width);
      cv.width=img.width*s;cv.height=img.height*s;
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      if(!tc().zones[z])tc().zones[z]={};
      tc().zones[z].photo=cv.toDataURL("image/jpeg",0.8);

function drawZTrd(recs){
  var c=document.getElementById("ztrd");if(!c)return;
  if(!recs){var z=document.getElementById("mt").textContent;recs=zRecs(z).sort(function(a,b){return a.mes-b.mes;});}
  if(recs.length<2)return;
  var dpr=window.devicePixelRatio||1;
  c.width=(c.offsetWidth||700)*dpr;c.height=80*dpr;c.style.height="80px";
  var ctx=c.getContext("2d");ctx.scale(dpr,dpr);
  var W=c.offsetWidth||700,H=80,pL=34,pR=14,pT=10,pB=22;
  var ms2=recs.map(function(r){return r.mes;}),tots=recs.map(function(r){return tot(r.scores);});
  var valid=tots.filter(function(v){return v!==null;});if(!valid.length)return;
  var minV=Math.max(0,Math.floor(Math.min.apply(null,valid)/10)*10-10),maxV=100;
  function xS(i){return pL+(W-pL-pR)*i/(ms2.length-1);}
  function yS(v){return pT+(H-pT-pB)*(1-(v-minV)/(maxV-minV));}
  ctx.clearRect(0,0,W,H);
  [60,80,100].forEach(function(v){if(v<minV)return;var y=yS(v);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.strokeStyle="rgba(45,49,84,.3)";ctx.lineWidth=1;ctx.stroke();ctx.fillStyle="#64748b";ctx.font="9px sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";ctx.fillText(v+"%",pL-3,y);});
  SL.forEach(function(_,si){var vs=recs.map(function(r){return bys(r.scores)[si];});ctx.beginPath();var fi=true;vs.forEach(function(v,i){if(v!==null){if(fi){ctx.moveTo(xS(i),yS(v));fi=false;}else ctx.lineTo(xS(i),yS(v));}});ctx.strokeStyle=SK[si]+"55";ctx.lineWidth=1;ctx.stroke();});
  ctx.beginPath();var fi2=true;tots.forEach(function(v,i){if(v!==null){if(fi2){ctx.moveTo(xS(i),yS(v));fi2=false;}else ctx.lineTo(xS(i),yS(v));}});ctx.strokeStyle="#e2e8f0";ctx.lineWidth=2.5;ctx.stroke();
  var selMs=activeMonths();
  tots.forEach(function(v,i){
    if(v!==null){
      var isSel=selMs.indexOf(ms2[i])>=0;
      ctx.beginPath();ctx.arc(xS(i),yS(v),isSel?4:2.5,0,Math.PI*2);ctx.fillStyle=isSel?sem(v):"#334155";ctx.fill();
      if(isSel){ctx.fillStyle="#e2e8f0";ctx.font="bold 9px sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText(Math.round(v)+"%",xS(i),yS(v)-6);}
    }
    ctx.fillStyle="#64748b";ctx.font="9px sans-serif";ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(MNS[ms2[i]],xS(i),H-pB+4);
  });
}

function parseActs(txt){
  var lines=txt.split("\n").map(function(l){return l.replace(/^[-*•]\s*/,"").trim();}).filter(function(l){return l.length>3;});
  if(lines.length<2)lines=txt.split(".").map(function(l){return l.trim();}).filter(function(l){return l.length>4;});
  return lines.map(function(l,i){return{id:"a"+Date.now()+i,text:l,who:"",forum:"",status:"Abierta",due:"",notes:"",mes:0};});
}

// Use data attributes to avoid inline escaping issues
function updActE(el){
  var z=el.getAttribute("data-z"),m=parseInt(el.getAttribute("data-m")),i=parseInt(el.getAttribute("data-i")),f=el.getAttribute("data-f");
  var k=z+"|"+m;

}
function delActE(el){
  var z=el.getAttribute("data-z"),m=parseInt(el.getAttribute("data-m")),i=parseInt(el.getAttribute("data-i")),id=el.getAttribute("data-id");
  var k=z+"|"+m;if(ST.acts[k])ST.acts[k].splice(i,1);
  deleteActionSupa(id);renderAL(z,m);
}
function moveActE(el){
  var z=el.getAttribute("data-z"),oldM=parseInt(el.getAttribute("data-m")),i=parseInt(el.getAttribute("data-i")),newM=parseInt(el.value);
  if(oldM===newM)return;
  var oldK=z+"|"+oldM,newK=z+"|"+newM;
  if(!ST.acts[oldK]||!ST.acts[oldK][i])return;
  var act=ST.acts[oldK].splice(i,1)[0];
  act.mes=newM;
  if(!ST.acts[newK])ST.acts[newK]=[];
  ST.acts[newK].push(act);
  deleteActionSupa(act.id);
  saveAction(z,newM,act);
  renderAL(z,newM);
}

// ── DICE ────────────────────────────────────────────────────
function openDice(){ST.diceAssign={};ST._diceOpen=true;renderDiceView();}
function rollDice(){
  var zz=getZones();
  var owners=zz.map(function(z){return tc().zones[z]?tc().zones[z].owner||z:z;});
  var attempt=0,assigned={};
  do {
    var shuffled=owners.slice().sort(function(){return Math.random()-.5;});
    assigned={};var ok=true;
    zz.forEach(function(z,i){if(shuffled[i]===owners[i]&&zz.length>1)ok=false;assigned[z]=shuffled[i];});
    attempt++;
  } while(!ok&&attempt<200);
  ST.diceAssign=assigned;
  renderDiceView();
}
function renderDiceView(){
  var zz=getZones(),hasAssign=Object.values(ST.diceAssign).some(function(v){return v;});
  var h="<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:14px'>";
  h+="<div><div style='font-size:14px;font-weight:700'>Sorteo de Auditorias Cruzadas</div><div style='font-size:11px;color:#64748b;margin-top:2px'>Tira el dado hasta quedar conforme</div></div>";
  h+="<div style='display:flex;gap:8px'><button class='btn b-purple' style='font-size:18px;padding:8px 16px' onclick='rollDice()'>🎲 Tirar</button><button class='btn b-green' onclick='sendDiceMail()'>📧 Mail</button></div></div>";
  if(!hasAssign){
    h+="<div style='text-align:center;padding:50px;color:#64748b'><div style='font-size:40px;margin-bottom:12px'>🎲</div>Toca el dado para sortear auditorias cruzadas</div>";
  } else {
    h+="<div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:8px'>";
    zz.forEach(function(z){
      var aud=ST.diceAssign[z]||"—";var owner=tc().zones[z]?tc().zones[z].owner||"":"";
      var isOwn=owner&&aud===owner;
      h+="<div style='background:#22263a;border:1px solid #2d3154;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;border-left:3px solid "+(isOwn?"#f59e0b":"#8b5cf6")+"'>";
      h+="<div style='flex:1'><div style='font-size:12px;font-weight:600'>"+z+"</div><div style='font-size:10px;color:#64748b;margin-top:1px'>Dueño: "+(owner||"—")+"</div></div>";
      h+="<div style='text-align:right'><div style='font-size:11px;font-weight:700;color:#3b82f6'>"+aud+"</div><div style='margin-top:2px'><span class='"+(isOwn?"ob":"cx")+"'>"+(isOwn?"Dueño":"Cruzada")+"</span></div></div></div>";
    });
    h+="</div>";
  }
  // Fix: always re-create modal content to avoid stale state after close/reopen
  showM("Sorteo de Auditorias Cruzadas","<div id='dice-body'>"+h+"</div>");
}
function sendDiceMail(){
  var zz=getZones(),m=activeMonths()[0]||1,asgn={};
  zz.forEach(function(z){var a=ST.diceAssign[z]||"Sin asignar";if(!asgn[a])asgn[a]=[];asgn[a].push(z);});
  var body="Auditorias Cruzadas 5S — "+MN[m]+" "+ST.year+"\n\n";
  Object.keys(asgn).sort().forEach(function(a){body+=a+":\n";asgn[a].forEach(function(z){body+="  * "+z+"\n";});body+="\n";});
  body+="Completar antes del fin del mes. Gracias!";
  window.open("mailto:?subject=Auditorias Cruzadas 5S "+MN[m]+" "+ST.year+"&body="+encodeURIComponent(body));
}

// ── IMPORTAR ─────────────────────────────────────────────────
function rImport(){
  if(IS_VIEWER){document.getElementById("ct").innerHTML="<div class='card'><div style='text-align:center;padding:40px;color:#64748b'>Solo el administrador puede importar datos.</div></div>";return;}
  var team=ST.team;
  document.getElementById("ct").innerHTML=
    "<div class='g2' style='margin-bottom:10px'>"+
    "<div class='card'><div class='ct2'>"+team+" — Importar</div>"+
    "<div class='dz' onclick='document.getElementById(\"f-up\").click()' ondragover='event.preventDefault();this.style.borderColor=\"#3b82f6\"' ondragleave='this.style.borderColor=\"\"' ondrop='dropF(event)'>"+
    "<div style='font-size:32px;margin-bottom:6px'>📊</div><div style='font-weight:600'>Subir Forms "+team+" (.xlsx)</div>"+
    "<div style='font-size:11px;color:#64748b;margin-top:4px'>El sistema detecta el equipo automaticamente</div></div>"+
    "<input type='file' id='f-up' accept='.xlsx' style='display:none' onchange='importF(this)'>"+
    "<div id='ir-up' style='margin-top:7px'></div></div>"+
    "<div class='card'><div class='ct2'>Instrucciones</div>"+
    "<div style='font-size:13px;color:#94a3b8;line-height:1.8'>"+
    "<p>1. Google Forms → Respuestas → Ver en hojas de calculo</p>"+
    "<p>2. Descargar como <strong>Excel (.xlsx)</strong></p>"+
    "<p>3. Subir aqui — se guarda en Supabase automaticamente</p>"+
    "<p style='margin-top:8px;font-weight:600;color:#e2e8f0'>Equipo activo: "+team+"</p>"+
    "<p style='color:#64748b'>Los datos de "+team+" precargados (Ene–Jun 2026) ya estan disponibles.</p></div></div></div>";
}
function dropF(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f)procF(f);}
function importF(inp){if(inp.files[0])procF(inp.files[0]);}
async function procF(file){
  var div=document.getElementById("ir-up");
  div.innerHTML="<div style='color:#3b82f6;font-size:12px'>Procesando...</div>";
  var team=ST.team;
  var rd=new FileReader();
  rd.onload=async function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:"array"}),ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      var data=rows.slice(1).filter(function(r){return r[3];});
      var nr=data.map(function(r){
        var sc=[];for(var i=5;i<=34;i++){var v=r[i];sc.push(v!==null&&v!==undefined&&String(v).trim()!==""?parseInt(v):null);}
        return{mes:parseInt(r[1]),auditor:String(r[2]||"").trim(),zona:String(r[3]||"").trim(),scores:sc,comentario:String(r[35]||"").trim(),team:team};
      }).filter(function(r){return r.zona&&r.mes&&!isNaN(r.mes);});
      var exZ=getZones();
      var nZ=[];nr.forEach(function(r){if(exZ.indexOf(r.zona)<0&&nZ.indexOf(r.zona)<0)nZ.push(r.zona);});
      if(nZ.length>0&&confirm("Zonas nuevas ("+team+"):\n"+nZ.join("\n")+"\n\nAgregarlas?")){nZ.forEach(function(z){if(!tc().zones[z])tc().zones[z]={owner:"",photo:"",color:"#334155"};});saveConfig();}
      // Fix: remove all existing records for this team that appear in the Excel
      // so deleted/corrected rows are not kept from previous imports
      var incomingKeys=new Set(nr.map(function(r){return r.zona+"|"+r.mes;}));
      ST.recs=ST.recs.filter(function(x){
        if((x.team||"CMQ")!==team)return true; // keep other team
        return !incomingKeys.has(x.zona+"|"+x.mes); // remove only keys present in new excel
      });
      var saved=0;
      for(var i=0;i<nr.length;i++){
        var r=nr[i];
        ST.recs.push(r);await saveRecord(r);saved++;
      }
      ST.selMonths=[];initMonthDropdown();renderMonthBtn();
      div.innerHTML="<div style='color:#22c55e;font-size:12px'>✓ "+saved+" registros importados correctamente</div>";
    }catch(err){div.innerHTML="<div style='color:#ef4444;font-size:12px'>Error: "+err.message+"</div>";}
  };
  rd.readAsArrayBuffer(file);
}

// ── CONFIG ───────────────────────────────────────────────────
function rCfg(){
  if(IS_VIEWER){document.getElementById("ct").innerHTML="<div class='card'><div style='text-align:center;padding:40px;color:#64748b'>Solo el administrador puede modificar la configuracion.</div></div>";return;}
  var cfg=tc().cfg;
  var h="<div class='g2' style='margin-bottom:10px'>";
  h+="<div class='card'><div class='ct2'>Umbrales semaforo — "+ST.team+"</div>";
  h+="<div style='display:flex;flex-direction:column;gap:8px'>";
  h+="<div style='display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(45,49,84,.3)'><span style='flex:1'>🟢 Verde</span><input type='number' id='cg' value='"+cfg.green+"' style='width:60px;background:#22263a;border:1px solid #2d3154;border-radius:5px;color:#e2e8f0;padding:4px 7px;font-size:12px'><span style='color:#64748b;font-size:12px'>%</span></div>";
  h+="<div style='display:flex;align-items:center;gap:10px;padding:7px 0'><span style='flex:1'>🟡 Amarillo</span><input type='number' id='cy' value='"+cfg.yellow+"' style='width:60px;background:#22263a;border:1px solid #2d3154;border-radius:5px;color:#e2e8f0;padding:4px 7px;font-size:12px'><span style='color:#64748b;font-size:12px'>%</span></div>";
  h+="</div><button class='btn b-blue' style='margin-top:10px' onclick='saveCfg()'>Guardar</button></div>";
  h+="<div class='card'><div class='ct2'>Foros de seguimiento — "+ST.team+"</div>";
  cfg.forums.forEach(function(f,i){
    h+="<div style='display:flex;gap:7px;padding:5px 0;border-bottom:1px solid rgba(45,49,84,.3)'>";
    h+="<input type='text' value='"+esc(f)+"' data-fi='"+i+"' style='flex:1;background:#22263a;border:1px solid #2d3154;border-radius:5px;color:#e2e8f0;padding:4px 7px;font-size:12px' onchange='tc().cfg.forums[this.getAttribute(\"data-fi\")]=this.value;saveConfig()'>";
    h+="<button data-fi='"+i+"' onclick='tc().cfg.forums.splice(parseInt(this.getAttribute(\"data-fi\")),1);saveConfig();rCfg()' style='background:none;border:none;color:#64748b;cursor:pointer;padding:2px 7px;font-size:13px'>✕</button></div>";
  });
  h+="<div class='card'><div class='ct2'>Zonas — "+ST.team+"</div>";
  h+="<div style='font-size:11px;color:#64748b;margin-bottom:8px'>Podés editar, agregar area y eliminar zonas. Las marcadas (sin datos) no tienen auditorias en el Excel actual.</div>";
  h+="<table><thead><tr><th>Zona</th><th>Area</th><th>Dueño</th><th>Color</th><th></th></tr></thead><tbody>";
  var allCfgZones=getZones().slice();
  Object.keys(tc().zones).forEach(function(z){if(allCfgZones.indexOf(z)<0)allCfgZones.push(z);});
  allCfgZones.sort().forEach(function(z){
    var cfg2=tc().zones[z]||{};
    var hasRecs=tRecs().some(function(r){return r.zona===z;});
    h+="<tr>";
    h+="<td style='font-weight:600;font-size:11px;min-width:130px'>"+z+(hasRecs?"":" <span style='color:#f59e0b;font-size:9px'>(sin datos)</span>")+"</td>";
    h+="<td><input type='text' value='"+esc(cfg2.area||"")+"' placeholder='Area' style='background:#22263a;border:1px solid #2d3154;border-radius:5px;color:#e2e8f0;padding:4px 6px;font-size:11px;width:110px' data-z='"+esc(z)+"' data-f='area' onchange='updZoneField(this)'></td>";
    h+="<td><input type='text' value='"+esc(cfg2.owner||"")+"' placeholder='Sin dueño' style='background:#22263a;border:1px solid #2d3154;border-radius:5px;color:#e2e8f0;padding:4px 6px;font-size:11px;width:130px' data-z='"+esc(z)+"' data-f='owner' onchange='updZoneField(this)'></td>";
    h+="<td><input type='color' value='"+(cfg2.color||"#334155")+"' style='width:28px;height:22px;border:none;cursor:pointer;border-radius:4px' data-z='"+esc(z)+"' onchange='updZoneColor(this.getAttribute(\"data-z\"),this.value)'></td>";
    h+="<td><button class='del-zone-btn' data-z='"+esc(z)+"' style='background:none;border:none;color:#ef4444;cursor:pointer;padding:2px 8px;font-size:14px' title='Eliminar zona'>✕</button></td>";
    h+="</tr>";
  });
  h+="</tbody></table></div>";
  var hiddenZ=tc().hiddenZones||[];
  if(hiddenZ.length>0){
    h+="<div style='margin-top:14px;padding-top:10px;border-top:1px solid rgba(45,49,84,.4)'>";
    h+="<div style='font-size:11px;color:#64748b;margin-bottom:6px'>Zonas ocultas (auditorías conservadas):</div>";
    hiddenZ.forEach(function(z){
      h+="<div style='display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#22263a;border-radius:6px;margin-bottom:5px'>";
      h+="<span style='font-size:11px'>"+esc(z)+"</span>";
      h+="<button class='restore-zone-btn' data-z='"+esc(z)+"' style='background:none;border:none;color:#3b82f6;cursor:pointer;font-size:11px'>↺ Restaurar</button></div>";
    });
    h+="</div>";
  }
  h+="</div>";
  document.getElementById("ct").innerHTML=h;
  // Fix: event delegation for delete/restore zone - avoids data-z encoding mismatch
  document.getElementById("ct").addEventListener("click",function(e){
    var btn=e.target.closest(".del-zone-btn");
    if(btn){var z=btn.getAttribute("data-z");if(z)deleteZone(z);return;}
    var rbtn=e.target.closest(".restore-zone-btn");
    if(rbtn){
      var z2=rbtn.getAttribute("data-z");
      if(z2){
        tc().hiddenZones=(tc().hiddenZones||[]).filter(function(x){return x!==z2;});
        if(!tc().zones[z2])tc().zones[z2]={owner:"",area:"",photo:"",color:"#334155"};
        saveConfig();
        rCfg();
      }
    }
  });
}
function saveCfg(){
  tc().cfg.green=parseInt(document.getElementById("cg").value)||85;
  tc().cfg.yellow=parseInt(document.getElementById("cy").value)||60;
  saveConfig();
  var t=document.createElement("div");t.style.cssText="position:fixed;top:18px;right:18px;background:#22c55e;color:#fff;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;z-index:9999";t.textContent="✓ Guardado";document.body.appendChild(t);setTimeout(function(){t.remove();},2000);
}

// ── MODAL ────────────────────────────────────────────────────
function showM(title,bodyHtml){
  document.getElementById("mt").textContent=title;
  document.getElementById("mb").innerHTML=bodyHtml;
  document.getElementById("ov").classList.add("on");
}
function showMEl(title,bodyEl){
  document.getElementById("mt").textContent=title;
  var mb=document.getElementById("mb");mb.innerHTML="";mb.appendChild(bodyEl);
  document.getElementById("ov").classList.add("on");
}
function closeM(){document.getElementById("ov").classList.remove("on");}

loadFromSupa();
